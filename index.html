<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Remove restrictive camera policy -->
    <meta http-equiv="Permissions-Policy" content="camera *">
    <title>Zen Bubble Pop - Stress Relief</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width:100%; height:100%;
            background: linear-gradient(135deg, #FFF5E1, #E3F2FD);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            touch-action: none; /* prevents pull-to-refresh */
        }
        .game-wrapper {
            position: relative; width:100%; height:100%;
        }
        canvas#gameCanvas {
            position: absolute; top:0; left:0; width:100%; height:100%;
        }
        .ui-overlay {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 30px);
            left:50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.7); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 10px 25px;
            font-size: 1.2rem; font-weight: bold; color: #555;
            z-index:10;
        }
        .hand-status {
            position: absolute; bottom: 80px; left:50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 8px 20px;
            color: #777; font-size: 0.95rem; white-space: nowrap;
            z-index:10; display: none;
        }
        .start-btn {
            position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
            background: linear-gradient(135deg, #FFC8DD, #FFAFCC);
            color: white; border: none; padding: 20px 40px; border-radius: 50px;
            font-size: 1.5rem; cursor: pointer; transition: 0.2s; z-index:20;
            box-shadow: 0 8px 25px rgba(255,100,150,0.4);
        }
        .start-btn:active { transform: translate(-50%,-50%) scale(0.95); }
        .start-btn:disabled { opacity:0.7; pointer-events:none; }
        .loading-text {
            position: absolute; bottom:50%; left:50%; transform: translate(-50%,50%);
            color: #555; font-weight: bold; display: none; z-index:21;
        }
    </style>
    <!-- Local MediaPipe libraries -->
    <script src="https://cdn.jsdelivr.net/npm/vconsole@latest/dist/vconsole.min.js"></script>
<script>new VConsole();</script>
    <script src="lib/mediapipe/hands/hands.js"></script>
    <script src="lib/mediapipe/camera_utils.js"></script>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-overlay">
        ✨ Calm Score: <span id="scoreValue">0</span>
    </div>
    <div class="hand-status" id="handStatus">
        🤏 Pinch thumb & index finger to pop bubbles 🫧
    </div>
    <button class="start-btn" id="startBtn">Start Popping</button>
    <div class="loading-text" id="loadingText">Loading...</div>
</div>

<script>
(function() {
    // ---------- DOM Elements ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreValue');
    const handStatusDiv = document.getElementById('handStatus');
    const startBtn = document.getElementById('startBtn');
    const loadingText = document.getElementById('loadingText');

    // Check if local libraries loaded correctly
    if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
        startBtn.textContent = 'MediaPipe not loaded';
        startBtn.disabled = true;
        throw new Error('Local MediaPipe files missing or failed to load');
    }

    // ---------- Game Config ----------
    const TOTAL_BUBBLES = 12;
    let score = 0;
    let bubbles = [];
    let animationId = null;
    let camera = null;
    let hands = null;
    let videoElement = null;
    let isGameRunning = false;
    let prevPinching = false;
    let pinchCenter = null;
    let currentLandmarks = null;
    let canvasWidth, canvasHeight;
    const PINCH_THRESHOLD = 0.045;

    // ---------- Audio (synthesized pop sound) ----------
    let audioCtx = null;
    let popSoundBuffer = null;

    async function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const sampleRate = audioCtx.sampleRate;
        const duration = 0.18;
        const bufferSize = sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            const t = i / sampleRate;
            const freq = 800 * Math.exp(-t * 18);
            const carrier = Math.sin(2 * Math.PI * freq * t);
            const noise = (Math.random() * 2 - 1) * 0.45 * Math.exp(-t * 25);
            data[i] = (carrier * 0.6 + noise) * Math.exp(-t * 22) * 0.8;
        }
        popSoundBuffer = buffer;
    }

    function playPopSound() {
        if (!audioCtx || !popSoundBuffer) return;
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                const src = audioCtx.createBufferSource();
                src.buffer = popSoundBuffer;
                src.connect(audioCtx.destination);
                src.start();
            });
            return;
        }
        const src = audioCtx.createBufferSource();
        src.buffer = popSoundBuffer;
        src.connect(audioCtx.destination);
        src.start();
    }

    // ---------- Bubbles ----------
    function generateRandomBubble() {
    return {
        nx: 0.08 + Math.random() * 0.84,
        ny: 0.12 + Math.random() * 0.76,
        radiusNorm: 0.05 + Math.random() * 0.07,
        hue: Math.random() * 360   // 随机色相，用于彩虹肥皂泡
    };
}

    function initBubbles() {
        bubbles = [];
        for (let i = 0; i < TOTAL_BUBBLES; i++) {
            bubbles.push(generateRandomBubble());
        }
    }

    function replaceBubble(index) {
        if (index >= 0 && index < bubbles.length) {
            bubbles[index] = generateRandomBubble();
        }
    }

    function popBubblesAtPoint(normX, normY) {
        if (!isGameRunning) return 0;
        let popped = 0;
        for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            if (Math.hypot(normX - b.nx, normY - b.ny) < b.radiusNorm) {
                popped++;
                playPopSound();
                replaceBubble(i);
            }
        }
        if (popped > 0) {
            score += popped;
            scoreSpan.textContent = score;
            if (navigator.vibrate) navigator.vibrate(50);
        }
        return popped;
    }

    // ---------- Drawing ----------
    function drawBubbles() {
    for (let b of bubbles) {
        const cx = b.nx * canvasWidth;
        const cy = b.ny * canvasHeight;
        const baseSize = Math.min(canvasWidth, canvasHeight);
        const radius = b.radiusNorm * baseSize;
        if (radius < 2) continue;

        const hue = b.hue;
        // 肥皂泡中心纯白，中间带彩色半透明，边缘无色透明
        const grad = ctx.createRadialGradient(
            cx - radius * 0.3, cy - radius * 0.3, radius * 0.1,
            cx, cy, radius
        );
        grad.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
        grad.addColorStop(0.3, `hsla(${hue}, 70%, 70%, 0.6)`);
        grad.addColorStop(0.7, `hsla(${hue}, 80%, 60%, 0.2)`);
        grad.addColorStop(1, 'rgba(255, 255, 255, 0.05)');

        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 10;
        ctx.shadowColor = `hsla(${hue}, 80%, 70%, 0.4)`;
        ctx.fill();
        ctx.shadowBlur = 0;

        // 边缘淡白描边
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 左上小高光
        ctx.beginPath();
        ctx.arc(cx - radius * 0.2, cy - radius * 0.2, radius * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.fill();
    }
}


    function drawHand(landmarks) {
    if (!landmarks) return;
    const connections = [
        [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
        [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
        [0,17],[17,18],[18,19],[19,20]
    ];
    ctx.save();
    ctx.lineWidth = 3;  // 加粗线条
    for (let [a,b] of connections) {
        const p1 = landmarks[a], p2 = landmarks[b];
        // 降低可见度阈值，确保所有检测到的点都显示
        if (p1.visibility > 0.1 && p2.visibility > 0.1) {
            ctx.beginPath();
            ctx.moveTo(p1.x * canvasWidth, p1.y * canvasHeight);
            ctx.lineTo(p2.x * canvasWidth, p2.y * canvasHeight);
            ctx.strokeStyle = '#00ffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00ffff';
            ctx.stroke();
        }
    }
    // 绘制所有关键点（绿点，visibility > 0.1 即可）
    for (let lm of landmarks) {
        if (lm.visibility > 0.1) {
            ctx.beginPath();
            ctx.arc(lm.x * canvasWidth, lm.y * canvasHeight, 6, 0, 2*Math.PI);
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#00ff88';
            ctx.fill();
        }
    }
    // 绘制捏合指示圈
    if (pinchCenter) {
        const px = pinchCenter.x * canvasWidth;
        const py = pinchCenter.y * canvasHeight;
        ctx.beginPath();
        ctx.arc(px, py, 18, 0, 2*Math.PI);
        ctx.strokeStyle = '#ff3388';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ff3388';
        ctx.stroke();
    }
    ctx.restore();
}

    function drawVideoBackground(video) {
        if (!video || video.readyState < 2) return;
        const vw = video.videoWidth, vh = video.videoHeight;
        if (!vw || !vh) return;
        const scale = Math.max(canvasWidth / vw, canvasHeight / vh);
        const dx = (canvasWidth - vw * scale) / 2;
        const dy = (canvasHeight - vh * scale) / 2;
        ctx.drawImage(video, dx, dy, vw * scale, vh * scale);
    }

    // ---------- Gesture detection ----------
    function processPinch(landmarks) {
        if (!isGameRunning || !landmarks) return;
        const thumb = landmarks[4], index = landmarks[8];
        if (thumb.visibility < 0.6 || index.visibility < 0.6) {
            handStatusDiv.textContent = '✋ Hand not detected';
            prevPinching = false;
            return;
        }
        const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
        const pinching = dist < PINCH_THRESHOLD;
        pinchCenter = { x: (thumb.x + index.x)/2, y: (thumb.y + index.y)/2 };
        if (pinching && !prevPinching) {
            popBubblesAtPoint(pinchCenter.x, pinchCenter.y);
        }
        handStatusDiv.textContent = pinching ? '🤏 Pinching! Aim at bubbles' : '🖐️ Pinch thumb & index finger to pop bubbles';
        handStatusDiv.style.color = pinching ? '#ffaa44' : '#777';
        prevPinching = pinching;
    }

    // ---------- Render loop ----------
    function renderLoop() {
    if (!isGameRunning) return;
    if (canvas.clientWidth !== canvasWidth || canvas.clientHeight !== canvasHeight) {
        canvasWidth = canvas.clientWidth;
        canvasHeight = canvas.clientHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
    }
    ctx.clearRect(0,0,canvasWidth,canvasHeight);
    drawVideoBackground(videoElement);
    // bubble drift
    for (let b of bubbles) {
        b.nx += Math.sin(Date.now()*0.0008 + b.nx*10) * 0.0005;
        b.ny += Math.cos(Date.now()*0.0005 + b.ny*10) * 0.0005;
        b.nx = Math.min(0.94, Math.max(0.06, b.nx));
        b.ny = Math.min(0.92, Math.max(0.08, b.ny));
    }
    drawBubbles();
    if (currentLandmarks) drawHand(currentLandmarks);


    if (currentLandmarks) {
        ctx.font = 'bold 18px "Quicksand", sans-serif';
        ctx.fillStyle = '#00ff88';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00ff88';
        ctx.textAlign = 'left';
        ctx.fillText('✓ Hand Detected', 20, canvasHeight - 40);
        ctx.shadowBlur = 0;
    }

    animationId = requestAnimationFrame(renderLoop);
}

    // ---------- MediaPipe setup (local assets) ----------
    function initMediaPipe() {
        hands = new Hands({
            locateFile: (file) => `lib/mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.4,   
            minTrackingConfidence: 0.4     
        });
        hands.onResults((results) => {
            if (!isGameRunning) return;
            if (results.multiHandLandmarks?.length) {
                currentLandmarks = results.multiHandLandmarks[0];
                processPinch(currentLandmarks);
            } else {
                currentLandmarks = null;
                prevPinching = false;
                handStatusDiv.textContent = '✋ Hand not detected';
            }
        });
    }

    // ---------- Start / Stop ----------
    async function startGame() {
        if (isGameRunning) return;
        startBtn.disabled = true;
        loadingText.style.display = 'block';

        // Activate audio (must be in user gesture)
        if (!audioCtx) {
            try { await initAudio(); } catch(e) {}
        }
        if (audioCtx?.state === 'suspended') {
            await audioCtx.resume();
        }

        canvasWidth = canvas.clientWidth;
        canvasHeight = canvas.clientHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        score = 0;
        scoreSpan.textContent = '0';
        initBubbles();
        prevPinching = false;
        pinchCenter = null;
        currentLandmarks = null;
        isGameRunning = true;

        if (!hands) initMediaPipe();

        // Create hidden video element (muted for mobile autoplay)
        if (!videoElement) {
            videoElement = document.createElement('video');
            videoElement.setAttribute('playsinline', '');
            videoElement.setAttribute('autoplay', '');
            videoElement.muted = true;
            videoElement.style.display = 'none';
            document.body.appendChild(videoElement);
        }

        // Start camera
        try {
            if (camera) camera.stop();
            camera = new Camera(videoElement, {
                onFrame: async () => {
                    if (hands && isGameRunning) {
                        await hands.send({image: videoElement});
                    }
                },
                width: 640,
                height: 480,
                facingMode: 'user'
            });
            await camera.start();
        } catch (err) {
            let msg = 'Camera error: ';
            if (err.name === 'NotAllowedError') msg += 'Permission denied.';
            else if (err.name === 'NotFoundError') msg += 'No camera found.';
            else msg += err.message || 'Unknown';
            alert(msg);
            isGameRunning = false;
            startBtn.disabled = false;
            loadingText.style.display = 'none';
            return;
        }

        // Start render loop
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(renderLoop);

        startBtn.style.display = 'none';
        handStatusDiv.style.display = 'block';
        loadingText.style.display = 'none';
    }

    // Prevent default touch behaviors on canvas
    canvas.addEventListener('touchstart', (e) => e.preventDefault());
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    startBtn.addEventListener('click', (e) => {
        e.preventDefault();
        startGame().catch(() => {
            alert('Failed to start. Please try again.');
            startBtn.disabled = false;
            loadingText.style.display = 'none';
        });
    });

    window.addEventListener('beforeunload', () => {
        if (camera) camera.stop();
        if (hands) hands.close();
    });

    // Initial canvas placeholder
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    ctx.fillStyle = '#333';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Tap "Start Popping"', canvas.width/2, canvas.height/2);
})();
</script>
</body>
</html>
